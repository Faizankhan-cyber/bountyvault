<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BountyVault | Sign Up</title>
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #171733;
      --surface-2: #1c1c3f;
      --accent: #6366f1;
      --accent-2: #4f46e5;
      --text: #ecedff;
      --muted: #9da0c7;
      --border: rgba(99, 102, 241, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 8%, rgba(99, 102, 241, 0.2), transparent 45%),
                  radial-gradient(circle at 88% 20%, rgba(34, 211, 238, 0.12), transparent 38%),
                  linear-gradient(180deg, #0f0f23 0%, #101028 55%, #0f0f23 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .card {
      width: min(520px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(165deg, var(--surface) 0%, var(--surface-2) 100%);
      padding: 1.4rem;
      box-shadow: 0 20px 46px rgba(8, 9, 18, 0.48);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 0.8rem;
      background: rgba(99, 102, 241, 0.14);
      color: #c5c8ff;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.32rem 0.72rem;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.35rem;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 1.2rem;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 0.9rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
    }

    label {
      font-size: 0.9rem;
      color: #d8dbff;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 0.7rem 0.8rem;
      font: inherit;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--border);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .actions {
      margin-top: 0.4rem;
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 600;
      padding: 0.72rem 1rem;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: var(--border);
    }

    .btn-ghost {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .note {
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .card {
        padding: 1.1rem;
      }

      .actions {
        flex-direction: column;
      }

      .actions .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Create Account</span>
    <h1>Join BountyVault</h1>
    <p class="sub">Create a profile to start posting or working on bounties.</p>

    <form id="signup-form">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required>
      </div>

      <div class="field">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="" selected disabled>Select role</option>
          <option value="poster">Poster</option>
          <option value="worker">Worker</option>
          <option value="arbitrator">Arbitrator</option>
        </select>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Continue</button>
        <a class="btn btn-ghost" href="auth.html">Back to Login</a>
      </div>
    </form>

    <p class="note" id="signup-note">After sign up, you will be redirected to login.</p>
  </main>

  <script>
    const signupForm = document.getElementById("signup-form");
    const signupNote = document.getElementById("signup-note");

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(signupForm);
      const profile = {
        name: String(formData.get("name") || "").trim(),
        email: String(formData.get("email") || "").trim(),
        password: String(formData.get("password") || ""),
        role: String(formData.get("role") || "").trim().toLowerCase()
      };

      try {
        console.log("[SIGNUP] request payload:", {
          ...profile,
          password: profile.password ? "***" : ""
        });

        const response = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(profile)
        });

        const data = await response.json();
        console.log("[SIGNUP] response:", data);

        if (!response.ok) {
          signupNote.textContent = data && data.error ? data.error : "Signup failed. Please try again.";
          return;
        }

        localStorage.setItem("pendingSignup", JSON.stringify({
          email: profile.email,
          role: profile.role
        }));

        signupNote.textContent = "Signup successful. Redirecting to login...";
        window.location.href = "auth.html";
      } catch (error) {
        console.error("[SIGNUP] error:", error);
        signupNote.textContent = "Unable to reach signup service. Please try again.";
      }
    });
  </script>
</body>
</html>
