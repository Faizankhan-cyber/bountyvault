<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BountyVault</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <h1 class="auth-title">Welcome to BountyVault</h1>

    <!-- Role Selection -->
    <div class="role-selection">
      <div class="role-card" data-role="poster">
        <h3>Poster</h3>
        <p>Create and manage bounties</p>
      </div>
      <div class="role-card" data-role="worker">
        <h3>Worker</h3>
        <p>Complete bounties and earn rewards</p>
      </div>
      <div class="role-card" data-role="admin">
        <h3>Admin</h3>
        <p>Manage the platform</p>
      </div>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="login-button">Login</button>
    </form>
  </div>

  <script src="auth.js"></script>
</body>
</html>
